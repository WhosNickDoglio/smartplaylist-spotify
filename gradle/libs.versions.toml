[versions]
agp = "8.13.2"
dependencyAnalysis = "3.0.0"
kotlin = "2.3.10"
detekt = "2.0.0-alpha.2"
kover = "0.9.1"
jdk = "25"
jdkTarget = "25"
sort = "0.16"
retrofit = "3.0.0"
okhttp = "5.3.2"

[plugins]
convention-kotlin = { id = "dev.whosnickdoglio.convention.kotlin", version = "0.3.0" }
detekt = { id = "dev.detekt", version.ref = "detekt" }
lint = { id = "com.android.lint", version.ref = "agp" }
doctor = { id = "com.osacky.doctor", version = "0.12.0" }
dependencyAnalysis = { id = "com.autonomousapps.dependency-analysis", version.ref = "dependencyAnalysis" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
kover = { id = "org.jetbrains.kotlinx.kover", version.ref = "kover" }
sortDependencies = { id = "com.squareup.sort-dependencies", version.ref = "sort" }
burst = { id = "app.cash.burst" }
metro = { id = "dev.zacsweers.metro", version = "0.11.4" }
buildConfig = { id = "com.github.gmazzo.buildconfig", version = "6.0.9" }
ktfmt = { id = "com.ncorti.ktfmt.gradle", version = "0.26.0" }
mockingbird = { id = "com.anthonycr.plugins.mockingbird", version = "3.1.0" }

[libraries]
clikt = { module = "com.github.ajalt.clikt:clikt", version = "5.1.0" }
datastore = { module = "androidx.datastore:datastore-preferences-core", version = "1.2.1" }
kotlin-serialization = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version = "1.10.0" }
retrofit-serialization = { module = "com.squareup.retrofit2:converter-kotlinx-serialization", version.ref = "retrofit" }
retrofit = { module = "com.squareup.retrofit2:retrofit", version.ref = "retrofit" }
retrofit-mock = { module = "com.squareup.retrofit2:retrofit-mock", version.ref = "retrofit" }
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }
eithernet = { module = "com.slack.eithernet:eithernet-integration-retrofit", version = "2.0.0" }
okhttp-logging = { module = "com.squareup.okhttp3:logging-interceptor", version.ref = "okhttp" }


junit = { module = "junit:junit", version = "4.13.2" }
burst = { module = "app.cash.burst:burst-gradle-plugin", version = "2.12.0" }
assertk = { module = "com.willowtreeapps.assertk:assertk", version = "0.28.1" }
